spring.application.name=order-service

server.port=8100

eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

resilience4j.circuitbreaker.instances.AUTHSERVICE.sliding-window-size=10
resilience4j.circuitbreaker.instances.AUTHSERVICE.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.AUTHSERVICE.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.AUTHSERVICE.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.AUTHSERVICE.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.product-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.product-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.product-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.product-service.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.product-service.permitted-number-of-calls-in-half-open-state=3

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.datasource.url=jdbc:mysql://localhost:3306/orders
spring.datasource.username=${db-username}
spring.datasource.password=${db-password}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${email}
spring.mail.password=${email-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

jwt.secret=${JWT_SECRET}

razorpay.client.id=${razorpay-client-id}
razorpay.client.secret=${razorpay-client-secret}

spring.data.redis.host=localhost
spring.data.redis.port=6379