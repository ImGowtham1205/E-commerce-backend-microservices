spring.application.name=authservice

server.port=${PORT:8080}

eureka.instance.prefer-ip-address=true

spring.cloud.openfeign.circuitbreaker.enabled=true
eureka.client.service-url.defaultZone=https://e-commerce-backend-microservices-production.up.railway.app/eureka/

resilience4j.circuitbreaker.instances.CART-SERVICE.sliding-window-size=10
resilience4j.circuitbreaker.instances.CART-SERVICE.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.CART-SERVICE.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.CART-SERVICE.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.CART-SERVICE.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.COMMENT.sliding-window-size=10
resilience4j.circuitbreaker.instances.COMMENT.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.COMMENT.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.COMMENT.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.COMMENT.permitted-number-of-calls-in-half-open-state=3

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.datasource.url=jdbc:mysql://gateway01.ap-southeast-1.prod.aws.tidbcloud.com:4000/authservice?sslMode=VERIFY_IDENTITY&enabledTLSProtocols=TLSv1.2
spring.datasource.username=${db-username}
spring.datasource.password=${db-password}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${email}
spring.mail.password=${email-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

jwt.secret=${JWT_SECRET}

spring.security.oauth2.client.registration.google.client-id=${google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
server.forward-headers-strategy=framework
spring.security.oauth2.client.registration.google.redirect-uri=https://e-commerce-backend-microservices-production-a49b.up.railway.app/authservice/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-name=Google

spring.security.oauth2.client.registration.amazon.client-id=${amazon-client-id}
spring.security.oauth2.client.registration.amazon.client-secret=${amazon-client-secret}
spring.security.oauth2.client.registration.amazon.scope=profile
spring.security.oauth2.client.registration.amazon.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.amazon.redirect-uri=https://e-commerce-backend-microservices-production-a49b.up.railway.app/authservice/login/oauth2/code/amazon
spring.security.oauth2.client.registration.amazon.client-name=Amazon

spring.security.oauth2.client.provider.amazon.authorization-uri=https://www.amazon.com/ap/oa
spring.security.oauth2.client.provider.amazon.token-uri=https://api.amazon.com/auth/o2/token
spring.security.oauth2.client.provider.amazon.user-info-uri=https://api.amazon.com/user/profile
spring.security.oauth2.client.provider.amazon.user-name-attribute=user_id

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true